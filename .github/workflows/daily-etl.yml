name: Daily ETL

on:
  schedule:
    - cron: "10 1 * * *"
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
      - name: Run ETL
        env:
          SEC_USER_AGENT: DATRadar-GHA/1.0
        run: ./pipeline/run_etl.sh
